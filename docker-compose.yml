services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      USE_QDRANT: ${USE_QDRANT:-false}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant:v1.13.2
    profiles:
      - vector
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
